<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(to bottom, #eef3f7, #f8fafc);
        }

        .settings-wrapper {
            padding-top: 2rem;
            padding-bottom: 3rem;
        }

        .settings-card {
            max-width: 500px;
            margin: auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: none;
            background: white;
        }

        .settings-header {
            background: linear-gradient(135deg, #3E4E59, #587082);
            color: white;
            text-align: center;
            padding: 1.5rem;
        }

        .settings-body {
            padding: 2rem;
        }

        .setting-box {
            background-color: #f4f7fa;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid #e3e8ee;
        }

        .setting-box:hover {
            background-color: #e9f0f5;
            cursor: pointer;
        }

        .setting-title {
            font-weight: 600;
            color: #2f3c45;
            margin-bottom: 0.25rem;
        }

        .setting-text {
            color: #6c757d;
            margin-bottom: 0;
        }

        .btn-custom {
            background-color: #dfe7ec;
            border: none;
            border-radius: 10px;
            color: #2f3c45;
            font-weight: 500;
        }

        .btn-custom:hover {
            background-color: #ced9e0;
            color: #2f3c45;
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <script>
        fetch("./navigation/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>

    <div class="container settings-wrapper">
        <div class="settings-card">

            <div class="settings-header">
                <h3 class="mb-0">Settings</h3>
            </div>

            <div class="settings-body">
                <div class="setting-box">
                    <div class="setting-title">Notifications</div>
                    <p class="setting-text">Manage reminders and alerts for tasks.</p>
                </div>

                <div class="setting-box">
                    <div class="setting-title">Account Preferences</div>
                    <p class="setting-text">Update your personal app preferences.</p>
                </div>

                <div class="setting-box">
                    <div class="setting-title">Privacy</div>
                    <p class="setting-text">Review privacy and account access options.</p>
                </div>

                <div class="text-center mt-4">
                    <a href="profile.html" class="btn btn-custom px-4 py-2">Back to Profile</a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
