<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(to bottom, #eef3f7, #f8fafc);
            min-height: 100vh;
        }

        .profile-wrapper {
            padding-top: 2rem;
            padding-bottom: 3rem;
        }

        .profile-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background-color: #ffffff;
        }

        .profile-header {
            background: linear-gradient(135deg, #3E4E59, #587082);
            color: white;
            text-align: center;
            padding: 2rem 1rem 4.5rem;
            position: relative;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
            background-color: #d9e2ea;
            position: absolute;
            left: 50%;
            bottom: -60px;
            transform: translateX(-50%);
        }

        .profile-body {
            padding: 5rem 2rem 2rem;
        }

        .profile-name {
            font-weight: 700;
            font-size: 1.5rem;
            color: #2f3c45;
        }

        .profile-role {
            color: #6c757d;
            margin-bottom: 1.75rem;
        }

        .info-box {
            background-color: #f4f7fa;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid #e3e8ee;
        }

        .info-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #587082;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            color: #2f3c45;
            margin-bottom: 0;
        }

        .btn-custom-primary {
            background-color: #587082;
            border: none;
            color: white;
        }

        .btn-custom-primary:hover {
            background-color: #4b616f;
            color: white;
        }

        .btn-custom-secondary {
            background-color: #dfe7ec;
            border: none;
            color: #2f3c45;
        }

        .btn-custom-secondary:hover {
            background-color: #ced9e0;
            color: #2f3c45;
        }

        .btn-danger {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
            padding: 0.65rem 1.2rem;
            font-weight: 500;
        }

        .modal-content {
            border-radius: 18px;
            border: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .modal-header {
            border-bottom: none;
        }

        .modal-footer {
            border-top: none;
        }

        @media (max-width: 576px) {
            .profile-body {
                padding: 5rem 1.25rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <script>
        fetch("./navigation/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>

    <div class="container profile-wrapper">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="profile-card">

                    <div class="profile-header">
                        <h3 class="mb-0 fw-bold">My Profile</h3>
                        <img src="https://via.placeholder.com/120"
                             alt="Profile Picture"
                             class="profile-avatar">
                    </div>

                    <div class="profile-body text-center">
                        <h4 class="profile-name mb-1">Arushi Chaturvedi</h4>
                        <p class="profile-role">Student User</p>

                        <div class="text-start">
                            <div class="info-box">
                                <div class="info-label">Email</div>
                                <p class="info-value">arushi@example.com</p>
                            </div>

                            <div class="info-box">
                                <div class="info-label">Major</div>
                                <p class="info-value">Computer Science</p>
                            </div>

                            <div class="info-box">
                                <div class="info-label">App Role</div>
                                <p class="info-value">User</p>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                            <a href="../index.html" class="btn btn-custom-secondary">Back</a>
                            <a href="setting.html" class="btn btn-custom-primary">Settings</a>
                            <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#logoutModal">
                                Logout
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Logout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to log out?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-custom-secondary" data-bs-dismiss="modal">Cancel</button>
                    <a href="../index.html" class="btn btn-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
