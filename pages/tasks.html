<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Tracker - My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --deep-sage: #4B6B54; --dark-slate: #3E4E59; --soft-dew: #F2F4F0; }
        body { background-color: var(--soft-dew); font-family: 'Open Sans', sans-serif; min-height: 100vh; }
        h2 { font-family: 'Lexend', sans-serif; color: var(--dark-slate); }
        .task-container { max-width: 800px; margin: 2rem auto; }
        .priority-high { border-left: 6px solid #dc3545; } 
        .priority-medium { border-left: 6px solid #fd7e14; } 
        .priority-low { border-left: 6px solid #198754; } 
        .list-group-item { background-color: #ffffff; border-radius: 12px !important; margin-bottom: 1rem; border: 1px solid #dee2e6; }
        .btn-primary-custom { background-color: var(--deep-sage) !important; border: none !important; color: #ffffff !important; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <main class="container task-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-uppercase">My Tasks</h2>
            <a href="newtasks.html" class="btn btn-primary-custom px-4 fw-bold shadow-sm">+ Add New</a>
        </div>
        <div id="taskList" class="list-group"></div>
    </main>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header"><h5 class="modal-title fw-bold">Confirm Delete</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">Are you sure you want to delete this task?</div>
                <div class="modal-footer border-0"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" id="confirmDelete" class="btn btn-danger">Delete Task</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header"><h5 class="modal-title fw-bold">Edit Task</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body"><form id="editForm"><div class="mb-3"><label class="form-label small fw-bold">NAME</label><input type="text" id="editName" class="form-control"></div><div class="mb-3"><label class="form-label small fw-bold">PRIORITY</label><select id="editPriority" class="form-select"><option value="1">Low</option><option value="2">Medium</option><option value="3">High</option></select></div></form></div>
                <div class="modal-footer border-0"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" id="saveEdit" class="btn btn-primary-custom">Save Changes</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentTaskId = null;

        function loadTasks() {
            const container = document.getElementById('taskList');
            const tasks = JSON.parse(localStorage.getItem('userTasks')) || [];
            container.innerHTML = '';
            tasks.forEach(task => {
                const priorityText = task.priority == "3" ? "High" : task.priority == "2" ? "Medium" : "Low";
                const pClass = task.priority == "3" ? "priority-high" : task.priority == "2" ? "priority-medium" : "priority-low";
                const bClass = task.priority == "3" ? "bg-danger" : task.priority == "2" ? "bg-warning text-dark" : "bg-success";
                
                container.innerHTML += `
                    <div class="list-group-item p-4 task-item ${pClass}" data-id="${task.id}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><h5 class="fw-bold mb-1">${task.name}</h5><span class="badge ${bClass}">${priorityText} Priority</span></div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-secondary btn-sm edit-btn" data-bs-toggle="modal" data-bs-target="#editModal"><i class="bi bi-pencil-square"></i></button>
                                <button class="btn btn-outline-danger btn-sm delete-btn" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            currentTaskId = btn.closest('.task-item').dataset.id;
            if (btn.classList.contains('edit-btn')) {
                const task = JSON.parse(localStorage.getItem('userTasks')).find(t => t.id == currentTaskId);
                document.getElementById('editName').value = task.name;
                document.getElementById('editPriority').value = task.priority;
            }
        });

        document.getElementById('confirmDelete').addEventListener('click', () => {
            let tasks = JSON.parse(localStorage.getItem('userTasks')).filter(t => t.id != currentTaskId);
            localStorage.setItem('userTasks', JSON.stringify(tasks));
            location.reload();
        });

        document.getElementById('saveEdit').addEventListener('click', () => {
            let tasks = JSON.parse(localStorage.getItem('userTasks'));
            const task = tasks.find(t => t.id == currentTaskId);
            task.name = document.getElementById('editName').value;
            task.priority = document.getElementById('editPriority').value;
            localStorage.setItem('userTasks', JSON.stringify(tasks));
            location.reload();
        });

        fetch("./navigation/navbar.html").then(res => res.text()).then(data => { document.getElementById("navbar").innerHTML = data; });
        loadTasks();
    </script>
</body>
</html>
